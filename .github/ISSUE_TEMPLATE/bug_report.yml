name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: "SQLAlchemy Foundation Kit version"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Minimal code that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback if applicable.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
