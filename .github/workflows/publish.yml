name: Publish

on:
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  id-token: write   # Trusted Publisher (PyPI OIDC)

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - run: uv publish
